<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放</title>
    <link rel="preload" href="../Image/mute.png" as="image">
    <link rel="preload" href="../Image/minimise.png" as="image">
    <link rel="preload" href="../Image/maximize.png" as="image">
    <link rel="preload" href="../Image/volume.png" as="image">
    <link rel="preload" href="../Image/pause.png" as="image">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 99.5%;
            height: 99%;
            background: white;
            position: relative;
        }
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .exit-fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        .volume-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .volume-slider-wrap {
            display: flex;
            align-items: center;
            width: 120px;
        }
        .volume-slider-wrap input[type="range"] {
            width: 100%;
            height: 6px;
            cursor: pointer;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
        }
        .play-overlay svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }
        .play-overlay.hidden { display: none; }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 15;
            color: white;
            font-size: 24px;
        }
        .loading-overlay.hidden { display: none; }
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            z-index: 20;
        }
        .play-btn, .fullscreen-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            height: 100%;
            background: #fff;
            border-radius: 3px;
            width: 0%;
        }
        .time {
            color: white;
            font-size: 16px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <button class="exit-fullscreen-btn" id="exitFullscreenBtn">
            <img src="../Image/minimise.png" alt="Exit Fullscreen" style="width: 24px; height: 24px;">
        </button>
        <video
            id="videoPlayer"
            src="../Video/Unboxing_zh.mp4"
            width="100%"
            height="100%"
            disablePictureInPicture
            oncontextmenu="return false;"
            autoplay>
        </video>
        <div class="loading-overlay" id="loadingOverlay">加载中</div>
        <div class="play-overlay" id="playOverlay">
            <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="40" fill="rgba(0,0,0,0.5)"/><polygon points="29,20 29,60 59,40" fill="white"/></svg>
        </div>
        <div class="controls" id="controls">
            <button class="play-btn" id="playBtn">
                <img id="playIcon" src="../Image/pause.png" alt="暂停" style="width: 26px; height: 26px;">
            </button>
            <div class="progress-bar" id="progressBar">
                <div class="progress-filled" id="progressFilled"></div>
            </div>
            <span class="time" id="timeDisplay">0:00 / 0:00</span>
            <button class="volume-btn" id="volumeBtn">
                <img id="volumeIcon" src="../Image/volume.png" alt="Volume" style="width: 26px; height: 26px;">
            </button>
            <div class="volume-slider-wrap" id="volumeSlider">
                <input type="range" min="0" max="1" step="0.05" value="1">
            </div>
            <button class="fullscreen-btn" id="fullscreenBtn">
                <img id="fullscreenIcon" src="../Image/maximize.png" alt="Fullscreen" style="width: 26px; height: 26px;">
            </button>
        </div>
    </div>
    <script>
        const btn = document.getElementById('exitFullscreenBtn');
        const video = document.getElementById('videoPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        document.addEventListener('fullscreenchange', function() {
            btn.style.display = document.fullscreenElement ? 'flex' : 'none';
        });
        document.addEventListener('webkitfullscreenchange', function() {
            btn.style.display = document.webkitFullscreenElement ? 'flex' : 'none';
        });
        btn.addEventListener('click', function() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });

        const playOverlay = document.getElementById('playOverlay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        let loadingInterval;

        function startLoadingAnimation() {
            let dots = 0;
            loadingOverlay.textContent = '加载中';
            loadingInterval = setInterval(() => {
                dots = (dots + 1) % 4;
                loadingOverlay.textContent = '加载中' + '.'.repeat(dots);
            }, 500);
        }

        function stopLoadingAnimation() {
            clearInterval(loadingInterval);
        }

        video.addEventListener('loadstart', function() {
            loadingOverlay.classList.remove('hidden');
            startLoadingAnimation();
        });

        video.addEventListener('waiting', function() {
            loadingOverlay.classList.remove('hidden');
            startLoadingAnimation();
        });

        video.addEventListener('canplay', function() {
            loadingOverlay.classList.add('hidden');
            stopLoadingAnimation();
        });

        video.addEventListener('playing', function() {
            loadingOverlay.classList.add('hidden');
            stopLoadingAnimation();
        });

        playOverlay.addEventListener('click', function() {
            video.play();
        });

        video.addEventListener('play', function() {
            playOverlay.classList.add('hidden');
        });

        video.addEventListener('pause', function() {
            playOverlay.classList.remove('hidden');
        });

        // 播放/暂停
        playBtn.addEventListener('click', function() {
            const playIcon = document.getElementById('playIcon');
            if (video.paused) {
                video.play();
                playIcon.src = '../Image/pause.png';
            } else {
                video.pause();
                playIcon.src = '../Image/play.png';
            }
        });

        video.addEventListener('play', function() {
            const playIcon = document.getElementById('playIcon');
            playIcon.src = '../Image/pause.png';
        });

        video.addEventListener('pause', function() {
            const playIcon = document.getElementById('playIcon');
            playIcon.src = '../Image/play.png';
        });

        // 时间格式化
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // 更新进度和时间
        video.addEventListener('timeupdate', function() {
            const percent = (video.currentTime / video.duration) * 100;
            progressFilled.style.width = percent + '%';
            timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
        });

        // 进度条点击跳转
        progressBar.addEventListener('click', function(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            video.currentTime = percent * video.duration;
        });

        // 全屏功能
        fullscreenBtn.addEventListener('click', function() {
            const container = document.querySelector('.video-container');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } else {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                }
            }
        });

        // 更新全屏按钮图标
        function updateFullscreenBtn() {
            const fullscreenIcon = document.getElementById('fullscreenIcon');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fullscreenIcon.src = '../Image/minimise.png';
                btn.style.display = 'flex';
            } else {
                fullscreenIcon.src = '../Image/maximize.png';
                btn.style.display = 'none';
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenBtn);
        document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

        const volBtn = document.getElementById('volumeBtn');
        const volWrap = document.getElementById('volumeSlider');
        const volSlider = volWrap.querySelector('input');

        function updateIcon() {
            const volumeIcon = document.getElementById('volumeIcon');
            volumeIcon.src = video.volume === 0 || video.muted ? '../Image/mute.png' : '../Image/volume.png';
        }

        volBtn.addEventListener('click', function() {
            video.muted = !video.muted;
        });

        volSlider.addEventListener('input', function() {
            video.volume = parseFloat(this.value);
            video.muted = false;
            updateIcon();
        });

        video.addEventListener('volumechange', function() {
            volSlider.value = video.muted ? 0 : video.volume;
            updateIcon();
        });

        let hideTimer;
        const controls = document.getElementById('controls');

        function hideControls() {
            controls.style.display = 'none';
            btn.style.display = 'none';
        }

        function showControls() {
            controls.style.display = 'flex';
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                btn.style.display = 'flex';
            }
        }

        function resetHideTimer() {
            clearTimeout(hideTimer);
            showControls();
            hideTimer = setTimeout(hideControls, 5000);
        }

        document.addEventListener('click', resetHideTimer);

        video.addEventListener('click', function() {
            if (controls.style.display === 'none') {
                showControls();
                resetHideTimer();
            }
        });
    </script>
</body>
</html>
