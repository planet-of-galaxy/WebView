<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: white;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <iframe
            src="https://player.bilibili.com/player.html?bvid=BV1S1A7zxEm4&danmaku=0"
            width="100%"
            height="100%"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
