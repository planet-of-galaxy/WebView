<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 99.5%;
            height: 99%;
            background: white;
        }
        video.fullscreen-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            background: #000;
        }
        #exitBtn {
            display: none;
            position: fixed;
            top: 12px; right: 12px;
            z-index: 10000;
            padding: 8px 14px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        #fsBtn {
            display: block;
            margin: 4px;
            padding: 8px 14px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video
            src="../Video/Unboxing/Unboxing_zh.mp4"
            width="100%"
            height="100%"
            controls
            autoplay
            playsinline
            controlsList="nofullscreen nodownload">
        </video>
    </div>
    <button id="fsBtn" onclick="enterFS()">⛶ 全屏</button>
    <button id="exitBtn" onclick="exitFS()">✕ 退出全屏</button>
    <script>
        const video = document.querySelector('video');
        function enterFS() {
            video.classList.add('fullscreen-mode');
            document.getElementById('exitBtn').style.display = 'block';
            document.getElementById('fsBtn').style.display = 'none';
        }
        function exitFS() {
            video.classList.remove('fullscreen-mode');
            document.getElementById('exitBtn').style.display = 'none';
            document.getElementById('fsBtn').style.display = 'block';
        }
    </script>
</body>
</html>
