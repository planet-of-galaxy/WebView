<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 99.5%;
            height: 99%;
            background: white;
            position: relative;
        }
        .exit-fullscreen-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .exit-fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        .volume-btn {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            z-index: 2147483646;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 22px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .volume-slider-wrap {
            display: none;
            position: absolute;
            top: 50%;
            right: 62px;
            transform: translateY(-50%);
            z-index: 2147483646;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 12px 6px;
            align-items: center;
            justify-content: center;
        }
        .volume-slider-wrap.show { display: flex; }
        .volume-slider-wrap input[type="range"] {
            writing-mode: vertical-lr;
            direction: rtl;
            width: 36px;
            height: 120px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="exit-fullscreen-btn" id="exitFullscreenBtn">&lt;</button>
    <div class="video-container">
        <video
            id="videoPlayer"
            src="../Video/Unboxing_en.mp4"
            width="100%"
            height="100%"
            controls
            autoplay>
        </video>
        <div class="volume-slider-wrap" id="volumeSlider">
            <input type="range" min="0" max="1" step="0.05" value="1">
        </div>
        <button class="volume-btn" id="volumeBtn">🔊</button>
    </div>
    <script>
        const btn = document.getElementById('exitFullscreenBtn');
        const video = document.getElementById('videoPlayer');
        document.addEventListener('fullscreenchange', function() {
            btn.style.display = document.fullscreenElement ? 'flex' : 'none';
        });
        document.addEventListener('webkitfullscreenchange', function() {
            btn.style.display = document.webkitFullscreenElement ? 'flex' : 'none';
        });
        btn.addEventListener('click', function() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });

        const volBtn = document.getElementById('volumeBtn');
        const volWrap = document.getElementById('volumeSlider');
        const volSlider = volWrap.querySelector('input');

        function updateIcon() {
            volBtn.textContent = video.volume === 0 || video.muted ? '🔇' : '🔊';
        }

        volBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            volWrap.classList.toggle('show');
        });

        volSlider.addEventListener('input', function() {
            video.volume = parseFloat(this.value);
            video.muted = false;
            updateIcon();
        });

        video.addEventListener('volumechange', function() {
            volSlider.value = video.muted ? 0 : video.volume;
            updateIcon();
        });

        document.addEventListener('click', function(e) {
            if (!volWrap.contains(e.target) && e.target !== volBtn) {
                volWrap.classList.remove('show');
            }
        });
    </script>
</body>
</html>
