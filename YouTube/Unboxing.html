<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 99.5%;
            height: 99%;
            background: white;
            position: relative;
        }
        .exit-fullscreen-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .exit-fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <button class="exit-fullscreen-btn" id="exitFullscreenBtn">&lt;</button>
    <div class="video-container">
        <video
            id="videoPlayer"
            src="../Video/Unboxing_en.mp4"
            width="100%"
            height="100%"
            controls
            autoplay>
        </video>
    </div>
    <script>
        const btn = document.getElementById('exitFullscreenBtn');
        const video = document.getElementById('videoPlayer');
        document.addEventListener('fullscreenchange', function() {
            btn.style.display = document.fullscreenElement ? 'flex' : 'none';
        });
        document.addEventListener('webkitfullscreenchange', function() {
            btn.style.display = document.webkitFullscreenElement ? 'flex' : 'none';
        });
        btn.addEventListener('click', function() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });
    </script>
</body>
</html>
